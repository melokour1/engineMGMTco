<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900"
     font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="1600" height="900" fill="#F5EFE3"/>

  <!-- Logo icon box -->
  <rect x="740" y="300" width="120" height="120" rx="26" fill="#0A0A0A"/>

  <!-- E monogram inside icon (84×84 inner area at 758,318) -->
  <rect x="758" y="318" width="12" height="84" rx="3"  fill="white"/>
  <rect x="758" y="318" width="56" height="12" rx="3"  fill="white"/>
  <rect x="758" y="354" width="44" height="12" rx="3"  fill="white"/>
  <rect x="758" y="390" width="56" height="12" rx="3"  fill="white"/>

  <!-- Company name -->
  <text x="800" y="506"
        text-anchor="middle"
        fill="#0A0A0A"
        font-size="90"
        font-weight="700"
        letter-spacing="-1.5">EngineMgmt</text>

  <!-- Tagline -->
  <text x="800" y="552"
        text-anchor="middle"
        fill="rgba(10,10,10,0.45)"
        font-size="22"
        font-weight="500"
        letter-spacing="5">LOCAL SEO · BUILT FOR LOCAL BUSINESSES</text>

</svg>
