<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900"
     font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="1600" height="900" fill="#F5EFE3"/>

  <!-- Icon box -->
  <rect x="740" y="310" width="120" height="120" rx="26" fill="#0A0A0A"/>

  <!-- Engine icon scaled to fit 84×84 inner area, centered -->
  <g transform="translate(760,330) scale(3.6)" fill="white">
    <rect x="6"  y="6"  width="14" height="10" rx="1"/>
    <rect x="2"  y="8"  width="5"  height="5"  rx="1"/>
    <rect x="7"  y="3"  width="4"  height="4"  rx="0.5"/>
    <rect x="15" y="3"  width="4"  height="4"  rx="0.5"/>
    <rect x="6"  y="16" width="3"  height="3"  rx="0.5"/>
    <rect x="17" y="16" width="3"  height="3"  rx="0.5"/>
  </g>

  <!-- Company name -->
  <text x="800" y="528"
        text-anchor="middle"
        fill="#0A0A0A"
        font-size="90"
        font-weight="700"
        letter-spacing="-1.5">EngineMgmt</text>

  <!-- Tagline -->
  <text x="800" y="572"
        text-anchor="middle"
        fill="rgba(10,10,10,0.45)"
        font-size="22"
        font-weight="500"
        letter-spacing="5">LOCAL SEO · BUILT FOR LOCAL BUSINESSES</text>

</svg>
