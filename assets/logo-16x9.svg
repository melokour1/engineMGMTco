<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900"
     font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="1600" height="900" fill="#F5EFE3"/>

  <!-- Icon box (120×120, centered at x=800) -->
  <rect x="740" y="323" width="120" height="120" rx="26" fill="#0A0A0A"/>

  <!-- Engine icon: same 22×22 design, scale(4), centered in 84×84 inner area -->
  <!-- Inner area: (758,341)→(842,425). transform centers engine bounding box exactly -->
  <g transform="translate(756,339) scale(4)" fill="white">
    <rect x="6"  y="5"  width="13" height="12" rx="0.125"/>
    <circle cx="3.5" cy="11" r="2.5"/>
    <rect x="7"  y="3"  width="2" height="3"  rx="0.075"/>
    <rect x="10" y="3"  width="2" height="3"  rx="0.075"/>
    <rect x="13" y="3"  width="2" height="3"  rx="0.075"/>
    <rect x="16" y="3"  width="2" height="3"  rx="0.075"/>
    <rect x="19" y="7"  width="2" height="7"  rx="0.075"/>
    <rect x="7"  y="17" width="2" height="2"  rx="0.075"/>
    <rect x="10" y="17" width="2" height="2"  rx="0.075"/>
    <rect x="13" y="17" width="2" height="2"  rx="0.075"/>
    <rect x="16" y="17" width="2" height="2"  rx="0.075"/>
  </g>

  <!-- Company name -->
  <text x="800" y="528"
        text-anchor="middle"
        fill="#0A0A0A"
        font-size="90"
        font-weight="700"
        letter-spacing="-1.5">EngineMgmt</text>

  <!-- Tagline -->
  <text x="800" y="572"
        text-anchor="middle"
        fill="rgba(10,10,10,0.45)"
        font-size="22"
        font-weight="500"
        letter-spacing="6">LOCAL SEO</text>

</svg>
